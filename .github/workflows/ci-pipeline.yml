name: Project CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Backend CI: Handles your Node.js server (server.js)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Backend Lint & Test
        run: |
          cd backend
          # Runs 'lint' and 'test' scripts defined in your package.json
          npm run lint --if-present
          npm test --if-present

  # 2. Frontend CI: Lints your index.html
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint HTML
        run: |
          # Install a simple HTML linter to check for syntax errors in index.html
          npm install -g htmlhint
          htmlhint "frontend/**/*.html"

  # 3. Infrastructure Check: Validates your Kubernetes manifests (k8s/ folder)
  k8s-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate K8s YAML Syntax
        run: |
          # Ensures your deployments and ingress are valid
          kubectl apply --dry-run=client -f k8s/

  # 4. Build Check: Ensures Dockerfiles are functional
  docker-check:
    needs: [backend-ci, frontend-ci, k8s-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build ./backend -t backend-test:latest

      - name: Build Frontend Image
        run: docker build ./frontend -t frontend-test:latest