apiVersion: v1
kind: ServiceAccount
metadata:
  name: dex-serviceaccount
  namespace: auth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dex-clusterrole
rules:

  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  - apiGroups: ["dex.coreos.com"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dex-clusterrole-binding
subjects:
  - kind: ServiceAccount
    name: dex-serviceaccount
    namespace: auth
roleRef:
  kind: ClusterRole
  name: dex-clusterrole
  apiGroup: rbac.authorization.k8s.io
