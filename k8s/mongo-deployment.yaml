# mongo-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: three-tier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: testdb
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: password
        # --- ADD THIS SECTION ---
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db   # This is where MongoDB stores its data
      # --- ADD THIS SECTION ---
      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc  # This must match the name in your PVC file
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: three-tier
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017